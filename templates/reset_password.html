{% extends "base.html" %}
{% block title %}Set New Password — HealthTrack{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i data-lucide="lock" class="auth-icon"></i>
                <h1>Set New Password</h1>
                <p>Choose a strong password for your account</p>
            </div>

            <form method="POST" action="/reset-password" class="auth-form">
                <input type="hidden" name="token" value="{{ token }}">
                <div class="form-group">
                    <label for="password">
                        <i data-lucide="lock" style="width:16px;height:16px"></i> New Password
                    </label>
                    <input type="password" id="password" name="password" placeholder="Min 8 characters" required minlength="8">
                    <button type="button" class="password-toggle" onclick="togglePassword('password')">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i data-lucide="check" style="width:18px;height:18px"></i>
                    Update Password
                </button>
            </form>

            <div class="auth-footer">
                <p>Remember your password? <a href="/login">Sign in</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
